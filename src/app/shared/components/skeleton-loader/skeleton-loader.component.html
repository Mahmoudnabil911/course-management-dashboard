@if (type === 'table') {
  <div class="space-y-4">
    <!-- Table Header Skeleton -->
    <div class="h-10 bg-slate-800 rounded-lg w-full animate-pulse"></div>
    <!-- Table Rows Skeletons -->
    @for (row of [1, 2, 3, 4, 5]; track row) {
      <div class="flex items-center space-x-4 p-4 bg-slate-800/40 rounded-xl border border-slate-700/50 animate-pulse">
        <div class="h-6 bg-slate-700 rounded w-1/12"></div>
        <div class="h-6 bg-slate-700 rounded w-4/12"></div>
        <div class="h-6 bg-slate-700 rounded w-2/12"></div>
        <div class="h-6 bg-slate-700 rounded w-1/12"></div>
        <div class="h-6 bg-slate-700 rounded w-1/12"></div>
        <div class="h-6 bg-slate-700 rounded w-1/12"></div>
        <div class="h-6 bg-slate-700 rounded w-2/12"></div>
      </div>
    }
  </div>
} @else if (type === 'card') {
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @for (card of [1, 2, 3, 4, 5, 6]; track card) {
      <div class="bg-slate-800/40 border border-slate-700/50 rounded-2xl p-6 space-y-4 animate-pulse">
        <div class="flex items-center justify-between">
          <div class="h-6 bg-slate-700 rounded w-1/4"></div>
          <div class="h-6 bg-slate-700 rounded w-1/5"></div>
        </div>
        <div class="h-8 bg-slate-700 rounded w-3/4"></div>
        <div class="h-4 bg-slate-700 rounded w-1/2"></div>
        <div class="space-y-2 pt-2">
          <div class="h-3 bg-slate-700 rounded w-full"></div>
          <div class="h-3 bg-slate-700 rounded w-5/6"></div>
        </div>
        <div class="flex items-center justify-between pt-4 border-t border-slate-700/50">
          <div class="h-6 bg-slate-700 rounded w-1/3"></div>
          <div class="h-8 bg-slate-700 rounded w-1/4"></div>
        </div>
      </div>
    }
  </div>
} @else {
  <!-- Default details skeleton -->
  <div class="max-w-3xl mx-auto bg-slate-800/40 border border-slate-700/50 rounded-2xl p-8 space-y-6 animate-pulse">
    <div class="h-6 bg-slate-700 rounded w-24"></div>
    <div class="h-10 bg-slate-700 rounded w-2/3"></div>
    <div class="h-4 bg-slate-700 rounded w-1/3"></div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 pt-4">
      @for (item of [1, 2, 3, 4]; track item) {
        <div class="h-16 bg-slate-700/50 rounded-xl p-3"></div>
      }
    </div>
    <div class="space-y-3 pt-4">
      <div class="h-4 bg-slate-700 rounded w-full"></div>
      <div class="h-4 bg-slate-700 rounded w-full"></div>
      <div class="h-4 bg-slate-700 rounded w-2/3"></div>
    </div>
    <div class="h-10 bg-slate-700 rounded w-36 pt-4"></div>
  </div>
}
