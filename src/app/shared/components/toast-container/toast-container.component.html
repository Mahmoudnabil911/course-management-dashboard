<div class="fixed top-4 right-4 z-50 flex flex-col gap-2 max-w-sm w-full">
  @for (toast of toastService.toasts(); track toast.id) {
    <div 
      [ngClass]="{
        'bg-emerald-500 border-emerald-600': toast.type === 'success',
        'bg-rose-500 border-rose-600': toast.type === 'error',
        'bg-amber-500 border-amber-600': toast.type === 'warning',
        'bg-blue-500 border-blue-600': toast.type === 'info'
      }"
      class="flex items-start justify-between p-4 rounded-xl shadow-lg border text-white animate-slide-in pointer-events-auto"
    >
      <div class="flex gap-2">
        <!-- Icon -->
        @if (toast.type === 'success') {
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        } @else if (toast.type === 'error') {
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        } @else if (toast.type === 'warning') {
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        } @else {
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        }
        <p class="text-sm font-medium leading-5">{{ toast.message }}</p>
      </div>
      <button (click)="toastService.dismiss(toast.id)" class="text-white hover:text-slate-200 transition-colors ml-3 flex-shrink-0">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
  }
</div>
